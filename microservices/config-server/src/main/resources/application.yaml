spring:
    application:
        name: config-server
    cloud:
        config:
            server:
                git: 
                    uri: https://github.com/KaanKayaS/Turkcell-Config-Server.git
                    default-label: main
                    search-paths: microservices/configs,microservices/configs/{application}
                    clone-on-start: true
                    force-pull: true
                    
                
server:
    port: 8888