spring:
  cloud:
    stream:
      bindings:
        testEvent-out-0:
          destination: test-topic 
          content-type: application/json 
      kafka:
        binder:
          brokers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5433/products
    username: postgres
    password: test12345
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/turkcell-microservices
          jwk-set-uri: http://localhost:8180/realms/turkcell-microservices/protocol/openid-connect/certs